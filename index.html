<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#173a2c" />
    <title>朝会スピーチ・トレイル</title>
  </head>
  <body>
    <canvas id="game" aria-label="3Dの登山ゲーム"></canvas>

    <header id="hud" class="hidden" aria-label="ゲーム情報">
      <div class="hud-pill phase"><span id="phase-icon" aria-hidden="true">☀</span><strong id="phase-label">朝</strong></div>
      <div class="hud-pill"><span aria-hidden="true">★</span><strong id="star-count">0/6</strong></div>
      <div class="hud-pill timer"><span aria-hidden="true">◷</span><strong id="timer">03:00</strong></div>
      <div class="hud-pill lives"><span aria-hidden="true">♥</span><strong id="life-count">3</strong></div>
    </header>

    <button id="sound-toggle" class="icon-button" type="button" aria-label="音をミュート">♪</button>
    <div id="crosshair" class="hidden" aria-hidden="true"></div>
    <div id="interaction" class="hidden"><kbd>E</kbd><span id="interaction-label">原稿を読む</span></div>
    <div id="toast" role="status" aria-live="polite"></div>

    <section id="start-screen" class="screen visible">
      <div class="start-card">
        <p class="eyebrow">MORNING SPEECH QUEST</p>
        <h1>朝会スピーチ・<br /><em>トレイル</em></h1>
        <p class="intro">山に散らばった6つの原稿を、3分以内に集めよう。<br />すべて見つけたら、朝会スピーチの始まりです。</p>
        <div class="mission-row">
          <span>★ 原稿 6枚</span><span>◷ 制限 3分</span><span>♥ ライフ 3</span>
        </div>
        <button id="start-button" class="primary-button" type="button">登山をはじめる <span>→</span></button>
        <div class="controls">
          <span><kbd>WASD / ↑↓←→</kbd> 移動</span><span><kbd>SHIFT</kbd> ダッシュ</span><span><kbd>MOUSE</kbd> 視点</span><span><kbd>E</kbd> 取得</span>
        </div>
      </div>
      <div class="start-index"><span>01</span><i></i><span>SUMMIT</span></div>
    </section>

    <section id="manuscript-modal" class="modal" aria-modal="true" aria-labelledby="manuscript-title">
      <article class="paper-card">
        <div class="paper-meta"><span id="manuscript-number">SCRIPT 01 / 06</span><span class="found-badge">★ FOUND</span></div>
        <h2 id="manuscript-title"></h2>
        <div id="manuscript-body" class="paper-body"></div>
        <button id="close-manuscript" class="primary-button dark" type="button">トレイルに戻る <span>→</span></button>
      </article>
    </section>

    <section id="end-screen" class="screen">
      <div class="end-card">
        <p id="end-eyebrow" class="eyebrow">TRAIL ENDED</p>
        <h2 id="end-title">ゲームオーバー</h2>
        <p id="end-message"></p>
        <div id="end-stats" class="mission-row"></div>
        <button id="retry-button" class="primary-button" type="button">もう一度登る <span>↻</span></button>
      </div>
    </section>

    <section id="slides" aria-label="朝会スピーチのスライド">
      <div id="slide-stage"></div>
      <div class="slide-controls">
        <button id="prev-slide" type="button" aria-label="前のスライド">←</button>
        <span id="slide-counter">01 / 07</span>
        <button id="next-slide" type="button" aria-label="次のスライド">→</button>
      </div>
      <button id="replay-button" class="slide-replay" type="button">もう一度プレイ</button>
    </section>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
